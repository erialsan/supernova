    }
    maven {
        name = "FalsePattern"
        url = uri("https://mvn.falsepattern.com/releases/")
        content {
            includeGroup("com.falsepattern")
        }
    }
    maven {
        name = "mega"
        url = uri("https://mvn.falsepattern.com/gtmega_releases/")
        content {
            includeGroup("mega")
        }
    }
}
